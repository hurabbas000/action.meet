version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: actionmeet-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: actionmeet
    volumes:
      - mongodb_data:/data/db
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - actionmeet-network

  redis:
    image: redis:7-alpine
    container_name: actionmeet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - actionmeet-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: actionmeet-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongodb:27017/actionmeet?authSource=admin
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - actionmeet-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: actionmeet-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - actionmeet-network

volumes:
  mongodb_data:
  redis_data:

networks:
  actionmeet-network:
    driver: bridge
