<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ActionMeet - Every Action. Every Meeting. Accounted For.</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--primary:#4F46E5;--primary-dark:#3730A3;--primary-light:#E0E7FF;--accent:#0EA5E9;--success:#10B981;--warning:#F59E0B;--danger:#EF4444;--info:#3B82F6;--bg:#0B0F19;--bg2:#111827;--bg3:#1F2937;--card:#1F2937;--border:#374151;--text:#F9FAFB;--text2:#D1D5DB;--text3:#9CA3AF;--sidebar-w:260px;--radius:16px;--shadow:0 10px 30px rgba(0,0,0,.3);--glow:0 0 20px rgba(79,70,229,.3)}
[data-theme="light"]{--bg:#F8FAFC;--bg2:#FFFFFF;--bg3:#F3F4F6;--card:#FFFFFF;--border:#E5E7EB;--text:#111827;--text2:#4B5563;--text3:#6B7280;--shadow:0 10px 30px rgba(0,0,0,.05);--glow:0 0 20px rgba(79,70,229,.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{min-height:100vh}
/* ── Layout ── */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{padding:16px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(22,22,42,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);flex-shrink:0;z-index:10}
[data-theme="light"] .topbar{background:rgba(255,255,255,0.8)}
.topbar-title{font-size:20px;font-weight:700;color:var(--text)}
.content{flex:1;overflow-y:auto;padding:32px}
.content-inner{max-width:1440px;margin:0 auto;width:100%}
/* ── Sidebar ── */
.brand{padding:24px 20px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.brand-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.brand-icon img {width:100%;height:100%;object-fit:cover;}
.brand-name{font-size:18px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-tag{font-size:11px;color:var(--text3);font-weight:500}
.user-card{padding:16px;margin:12px;background:var(--bg3);border-radius:var(--radius);display:flex;align-items:center;gap:10px}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:15px;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--text)}
.user-role{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.nav{padding:8px 12px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--text2);font-size:13.5px;font-weight:500;transition:.2s;position:relative;margin-bottom:2px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--primary-light);color:var(--primary)}
.nav-item.active i{color:var(--primary)}
.nav-item i{width:18px;text-align:center;font-size:15px}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}
.nav-section{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:12px 12px 4px;font-weight:600}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border)}
/* ── Collapsed Sidebar ── */
.sidebar{transition:width .2s ease}
.sidebar.collapsed{width:70px}
.sidebar.collapsed .brand-name, .sidebar.collapsed .brand-tag, .sidebar.collapsed .user-name, .sidebar.collapsed .user-role, .sidebar.collapsed .nav-item span, .sidebar.collapsed .nav-badge{display:none}
.sidebar.collapsed .brand{padding:24px 17px 20px}
.sidebar.collapsed .user-card{padding:10px;justify-content:center}
.sidebar.collapsed .avatar{width:32px;height:32px;font-size:13px}
.sidebar.collapsed .nav-item{justify-content:center;padding:12px 0}
.sidebar.collapsed .nav-item i{margin:0;font-size:16px}
/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.2s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{background:transparent;border:none;cursor:pointer;padding:6px 8px;border-radius:8px;color:var(--text3);transition:.2s;font-size:13px}
.btn-icon:hover{background:var(--bg3);color:var(--text)}
.btn-icon.danger:hover{background:rgba(239,68,68,.15);color:var(--danger)}
/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.meeting-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:.2s}
.meeting-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow)}
.meeting-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.meeting-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text3);flex-wrap:wrap}
.meeting-meta i{color:var(--primary)}
/* ── Grid ── */
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-bottom:32px}
/* ── Stat Card ── */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;display:flex;align-items:center;gap:18px;box-shadow:var(--shadow);transition:all .3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.03));opacity:0;transition:.3s}
.stat-card:hover{transform:translateY(-4px);border-color:var(--primary);box-shadow:var(--glow)}
.stat-card:hover::before{opacity:1}
.stat-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.stat-icon.purple{background:linear-gradient(135deg,rgba(79,70,229,.2),rgba(79,70,229,.05));color:var(--primary)}
.stat-icon.red{background:linear-gradient(135deg,rgba(239,68,68,.2),rgba(239,68,68,.05));color:var(--danger)}
.stat-icon.green{background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(34,197,94,.05));color:var(--success)}
.stat-icon.orange{background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(245,158,11,.05));color:var(--warning)}
.stat-val{font-size:26px;font-weight:800;color:var(--text)}
.stat-label{font-size:12px;color:var(--text3);margin-top:2px}
/* ── Status badges ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.badge.upcoming{background:rgba(59,130,246,.15);color:#60A5FA}
.badge.past{background:rgba(100,116,139,.15);color:#94A3B8}
.badge.recurring{background:rgba(79,70,229,.15);color:var(--primary)}
.badge.cancelled{background:rgba(239,68,68,.15);color:var(--danger)}
.badge.host{background:rgba(245,158,11,.15);color:var(--warning)}
.badge.participant{background:rgba(34,197,94,.15);color:var(--success)}
.badge.open{background:rgba(245,158,11,.15);color:var(--warning)}
.badge.closed{background:rgba(34,197,94,.15);color:var(--success)}
/* ── Progress ── */
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;margin:12px 0 6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:.3s}
.progress-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
/* ── Filters ── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:.2s}
.filter-btn:hover{border-color:var(--primary);color:var(--primary)}
.filter-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
/* ── Agenda ── */
.agenda-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.agenda-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;flex-shrink:0;margin-top:1px}
.check-box:hover{border-color:var(--primary)}
.check-box.checked{background:var(--primary);border-color:var(--primary);color:#fff;font-size:12px}
.agenda-text{font-size:14px;color:var(--text);font-weight:500;flex:1}
.agenda-text.done{text-decoration:line-through;color:var(--text3)}
.agenda-note{font-size:12px;color:var(--text3);margin-top:4px}
.agenda-assignee{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);margin-top:6px}
.mini-avatar{width:20px;height:20px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
/* ── Tasks ── */
.task-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:.2s}
.task-card:hover{border-color:var(--border)}
.task-card.done .agenda-text{text-decoration:line-through;color:var(--text3)}
.task-body{flex:1}
.task-title{font-size:13.5px;font-weight:500;color:var(--text)}
.task-title.done{text-decoration:line-through;color:var(--text3)}
.task-sub{font-size:11px;color:var(--text3);margin-top:4px}
/* ── Team ── */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.team-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;transition:.2s}
.team-card:hover{border-color:var(--primary)}
.team-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;margin:0 auto 12px}
.team-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.team-email{font-size:11px;color:var(--text3);word-break:break-all}
/* ── Notif ── */
.notif-card{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.notif-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.notif-icon.info{background:rgba(59,130,246,.15);color:#60A5FA}
.notif-icon.success{background:rgba(34,197,94,.15);color:var(--success)}
.notif-icon.warning{background:rgba(245,158,11,.15);color:var(--warning)}
.notif-text{font-size:13px;color:var(--text);margin-bottom:4px}
.notif-time{font-size:11px;color:var(--text3)}
.notif-card.unread{background:rgba(79,70,229,.05);border-radius:8px;padding:12px}
/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:18px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
/* ── Form ── */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13.5px;font-family:inherit;transition:.2s}
.form-input:focus{outline:none;border-color:var(--primary)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{resize:vertical;min-height:80px}
/* ── Search ── */
.search-box{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 14px;margin-bottom:16px}
.search-box i{color:var(--text3)}
.search-box input{background:none;border:none;color:var(--text);font-size:13px;flex:1;font-family:inherit}
.search-box input:focus{outline:none}
/* ── Participant list in create meeting modal ── */
.user-search-results{max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-top:8px}
.user-result-item{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:.15s}
.user-result-item:hover{background:var(--bg3)}
.user-result-item.selected{background:var(--primary-light)}
.user-result-name{font-size:13px;font-weight:600;color:var(--text)}
.user-result-email{font-size:11px;color:var(--text3)}
.selected-participants{display:flex;flex-wrap:wrap;gap:6px;min-height:28px;margin-top:8px}
.participant-chip{display:flex;align-items:center;gap:6px;background:var(--primary-light);color:var(--primary);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600}
.participant-chip button{background:none;border:none;cursor:pointer;color:var(--primary);font-size:14px;padding:0;line-height:1}
/* ── Empty state ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.empty-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:8px}
.empty-sub{font-size:13px}
/* ── FAB ── */
.fab{position:fixed;bottom:28px;right:28px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));border:none;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 6px 24px rgba(79,70,229,.5);transition:.2s;z-index:100}
.fab:hover{transform:scale(1.1);box-shadow:0 8px 32px rgba(79,70,229,.7)}
/* ── Toast ── */
.toasts{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:260px;box-shadow:var(--shadow);animation:slideIn .3s ease}
.toast.success i{color:var(--success)}
.toast.error i{color:var(--danger)}
.toast.warning i{color:var(--warning)}
.toast.info i{color:var(--info)}
.toast span{font-size:13px;color:var(--text)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* ── Login ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;position:relative;overflow:hidden}
.login-page::before{content:"";position:absolute;width:600px;height:600px;background:var(--primary);filter:blur(150px);opacity:0.1;border-radius:50%;top:-100px;left:-100px}
.login-card{background:rgba(31, 41, 55, 0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;box-shadow:var(--shadow);position:relative;z-index:1}
[data-theme="light"] .login-card{background:rgba(255,255,255,0.8);border-color:rgba(0,0,0,0.05)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .icon{width:72px;height:72px;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:var(--glow);overflow:hidden}
.login-logo .icon img {width:100%;height:100%;object-fit:cover;}
.login-title{font-size:28px;font-weight:800;color:var(--text);text-align:center;letter-spacing:-0.5px;margin-bottom:8px}
.login-sub{font-size:14px;color:var(--text3);text-align:center;line-height:1.5}
.tab-btns{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:24px;gap:3px}
.tab-btn{flex:1;padding:8px;border:none;background:none;color:var(--text2);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.tab-btn.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.error-msg{color:var(--danger);font-size:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:8px 12px;margin-bottom:12px}
/* ── Section header ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:700;color:var(--text)}
/* ── Back button ── */
.back-btn{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;padding:6px 0;margin-bottom:16px;background:none;border:none}
.back-btn:hover{color:var(--text)}
/* ── Meeting detail ── */
.meeting-detail-header{margin-bottom:24px}
.meeting-detail-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:8px}
.participants-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
/* ── Collapsible ── */
.collapsible-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg3);border-radius:10px;cursor:pointer;margin-bottom:8px}
.collapsible-body{padding:0 4px}
.chevron{transition:.2s}
.collapsed .chevron{transform:rotate(-90deg)}
/* ── Settings Toggles ── */
.toggle-switch{position:relative;display:inline-block;width:40px;height:24px}
.toggle-switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:var(--bg3);transition:.3s;border-radius:24px;border:1px solid var(--border)}
.slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background-color:var(--text2);transition:.3s;border-radius:50%}
input:checked + .slider{background-color:var(--primary);border-color:var(--primary)}
input:checked + .slider:before{transform:translateX(16px);background-color:#fff}
/* ── Compact Mode ── */
body.compact-mode .card,body.compact-mode .meeting-card{padding:12px 16px}
body.compact-mode .stat-card{padding:14px}
body.compact-mode .agenda-item{padding:8px 0}
body.compact-mode .nav-item{padding:8px 10px;margin-bottom:0}
body.compact-mode .content{padding:18px 22px}
/* ── Three-dot Dropdown Menu ── */
.card-menu-wrap{position:relative;flex-shrink:0;z-index:20}
.card-menu-btn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;line-height:1;letter-spacing:1px}
.card-menu-btn:hover{background:var(--bg3);color:var(--text)}
.card-dropdown{position:absolute;top:38px;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:12px;min-width:180px;box-shadow:0 12px 40px rgba(0,0,0,.5);padding:6px;display:none;flex-direction:column;gap:2px;z-index:999}
.card-dropdown.open{display:flex}
.card-dropdown-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:.15s;width:100%}
.card-dropdown-item:hover{background:var(--bg3);color:var(--text)}
.card-dropdown-item.danger{color:var(--danger)}
.card-dropdown-item.danger:hover{background:rgba(239,68,68,.12);color:var(--danger)}
.card-dropdown-item i{width:16px;text-align:center;font-size:13px;opacity:.8}
.card-dropdown-sep{height:1px;background:var(--border);margin:4px 6px}
/* ── Meeting card stripe ── */
.meeting-card{position:relative;overflow:hidden}
.card-type-stripe{position:absolute;top:0;left:0;width:4px;height:100%}
.card-type-stripe.upcoming{background:linear-gradient(180deg,var(--info),var(--primary))}
.card-type-stripe.past{background:var(--border)}
.card-type-stripe.recurring{background:linear-gradient(180deg,var(--primary),var(--accent))}
.card-type-stripe.cancelled{background:var(--danger)}
/* ── Participant avatar stack ── */
.card-av-stack{display:flex;align-items:center}
.card-mini-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--card);margin-left:-7px;flex-shrink:0}
.card-mini-av:first-child{margin-left:0}
/* ── Responsive ── */
@media(max-width:1024px){
  .grid2{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){.sidebar{display:none}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toasts" id="toasts"></div>

<script>
const API = window.location.hostname === 'actionmeet.up.railway.app'
    ? 'https://actionmeet-api.up.railway.app/api'
    : 'http://localhost:3001/api';
// ─── State ───────────────────────────────────────
const S={
  user:null,token:null,view:'login',
  meetings:[],team:[],myTasks:[],notifs:[],
  sel:null,filter:'all',loginTab:'login',
  searchParticipants:[],selectedParticipants:[],
  settings:{theme:'dark',compactMode:false,sidebarCollapsed:false},
  init(){
    const set=localStorage.getItem('am_settings');
    if(set)this.settings={...this.settings,...JSON.parse(set)};
    this.applySettings();
    this.token=localStorage.getItem('am_tk');
    const u=localStorage.getItem('am_u');
    if(this.token&&u){this.user=JSON.parse(u);this.view='dashboard';}
    render();
    if(this.token)this.loadAll();
  },
  applySettings(){
    document.documentElement.setAttribute('data-theme',this.settings.theme);
    if(this.settings.compactMode)document.body.classList.add('compact-mode');
    else document.body.classList.remove('compact-mode');
    localStorage.setItem('am_settings',JSON.stringify(this.settings));
  },
  async loadAll(){
    await Promise.all([
        this.fetchMeetings(),
        this.fetchTeam(),
        this.fetchMyTasks(),
        this.fetchNotifications()
    ]);
    render();
  },
  async fetchMeetings(){
    try{
      const [rM, rR] = await Promise.all([api('/meetings'), api('/recurring')]);
      let allMeetings = [];
      if(rM.success) allMeetings = [...allMeetings, ...(rM.data.meetings||[]).map(normM)];
      if(rR.success) allMeetings = [...allMeetings, ...(rR.data.recurringMeetings||[]).map(m => {
          m.meetingType = 'recurring'; // force type for recurring configs
          // Make sure it has a valid date and title for the UI
          m.scheduledFor = m.nextMeetingDate || new Date().toISOString(); 
          return normM(m);
      })];
      this.meetings = allMeetings;
    }catch(e){console.error(e)}
  },
  async fetchTeam(){
    try{const r=await api('/team');
      if(r.success){const m={};
        this.teamRaw=r.data.teams||[];
        this.teamRaw.forEach(t=>(t.members||[]).filter(m=>m.isActive!==false).forEach(mb=>{
          if(mb.user&&!m[mb.user._id])m[mb.user._id]={
            id:mb.user._id,name:mb.user.name||mb.user.email,
            email:mb.user.email,phone:mb.user.phone||'',
            role:mb.role||'member',av:(mb.user.name||'U')[0].toUpperCase(),
            teamId:t._id,isAdmin:t.createdBy?._id===S.user?._id||mb.role==='admin'
          };
        }));
        this.team=Object.values(m);}
    }catch(e){}
  },
  async fetchMyTasks(){
    try{const r=await api('/tasks/my');
      if(r.success)this.myTasks=(r.data.tasks||[]).map(t=>({
        id:t._id,text:t.title||t.description||'Task',
        note:t.description||'',status:t.status==='completed'?'closed':'open',
        meetingId:t.meeting?._id||t.meeting,
        meetingTitle:t.meeting?.title||'Meeting',
        meetingDate:t.meeting?.scheduledFor?fmtDate(t.meeting.scheduledFor):''
      }));}catch(e){}
  },
  async fetchNotifications(){
    try{const r=await api('/notifications');
      if(r.success)this.notifs=(r.data.notifications||[]).map(n=>({
        id:n._id,text:n.text,type:n.type,time:'Just now',read:!!n.isRead
      }));}catch(e){}
  },
  getMeeting(id){return this.meetings.find(m=>m.id===id||m._id===id);},
  logout(){
    this.user=null;this.token=null;this.meetings=[];this.team=[];this.myTasks=[];
    localStorage.removeItem('am_tk');localStorage.removeItem('am_u');
    this.view='login';render();
  },
  getTeam(id){return this.teamRaw.find(t=>t._id===id);},
  teamRaw:[]
};
// ─── Helpers ─────────────────────────────────────
async function api(path,opts={}){
  const h={'Content-Type':'application/json'};
  if(S.token)h['Authorization']=`Bearer ${S.token}`;
  try {
    const r=await fetch(API+path,{...opts,headers:{...h,...(opts.headers||{})}});
    const isJson = r.headers.get('content-type')?.includes('application/json');
    if (!r.ok) {
      if (isJson) { const err = await r.json(); return { success: false, ...err }; }
      else { const text = await r.text(); return { success: false, message: 'Server Error: ' + text.substring(0,100) }; }
    }
    return isJson ? await r.json() : { success: true };
  } catch (err) {
    throw err;
  }
}
function normM(m){
  const now=new Date();const d=m.scheduledFor?new Date(m.scheduledFor):null;
  let st=m.status||'scheduled';
  if(['scheduled','in-progress'].includes(st))st=d&&d>now?'upcoming':'past';
  else if(st==='completed')st='past';
  const isHost=m.host&&(m.host._id||m.host)===S.user?._id;
  return{...m,id:m._id||m.id,date:d?fmtDate(d):'',status:st,
    role:isHost?'host':'participant',
    type:m.meetingType==='recurring'?'recurring':'single',
    agendaPoints:(m.agendaPoints||m.agenda||[]).map(a=>({
      id:a._id||a.id,_id:a._id||a.id,
      text:a.title||a.text||a.description||'',
      note:a.note||a.description||'',
      status:a.status==='completed'?'closed':a.status||'open',
      assignedTo:a.responsiblePerson?.user||a.assignedTo||null
    }))};
}
function fmtDate(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function toast(msg,type='info'){
  const c=document.getElementById('toasts');
  const t=document.createElement('div');t.className=`toast ${type}`;
  const ic={success:'fa-check-circle',error:'fa-times-circle',warning:'fa-exclamation-triangle',info:'fa-info-circle'};
  t.innerHTML=`<i class="fas ${ic[type]||ic.info}"></i><span>${msg}</span>`;
  c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(120px)';setTimeout(()=>t.remove(),300);},3000);
}
function closeModal(){document.querySelector('.modal-overlay')?.remove();}
// ─── Render ──────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=S.view==='login'?renderLogin():renderLayout();
  if(S.view==='login')hookLogin();else hookApp();
}
// ─── Login ───────────────────────────────────────
function renderLogin(){
  const isLogin=S.loginTab==='login';
  return`<div class="login-page"><div class="login-card">
  <div class="login-logo"><div class="icon"><img src="/assets/logo.png" alt="ActionMeet Logo"></div>
  <div class="login-title">ActionMeet</div>
  <div class="login-sub">Every Action. Every Meeting. Accounted For.</div></div>
  <div class="tab-btns">
    <button class="tab-btn ${isLogin?'active':''}" id="tabLogin">Sign In</button>
    <button class="tab-btn ${!isLogin?'active':''}" id="tabReg">Register</button>
  </div>
  <div id="authErr" class="error-msg" style="display:none"></div>
  ${isLogin?`
  <form id="authForm">
    <div class="form-group"><label class="form-label">Email</label>
      <input class="form-input" type="email" name="email" placeholder="your@email.com" required></div>
    <div class="form-group"><label class="form-label">Password</label>
      <input class="form-input" type="password" name="password" placeholder="••••••" required></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" id="authBtn">Sign In</button>
  </form>`:`
  <form id="authForm">
    <div class="form-group"><label class="form-label">Full Name</label>
      <input class="form-input" type="text" name="name" placeholder="John Doe" required></div>
    <div class="form-group"><label class="form-label">Email</label>
      <input class="form-input" type="email" name="email" placeholder="your@email.com" required></div>
    <div class="form-group"><label class="form-label">Password</label>
      <input class="form-input" type="password" name="password" placeholder="Min 6 characters" required></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" id="authBtn">Create Account</button>
  </form>`}
</div></div>`;
}
function hookLogin(){
  document.getElementById('tabLogin').onclick=()=>{S.loginTab='login';render();};
  document.getElementById('tabReg').onclick=()=>{S.loginTab='register';render();};
  document.getElementById('authForm').onsubmit=async e=>{
    e.preventDefault();
    const btn=document.getElementById('authBtn');
    const err=document.getElementById('authErr');
    err.style.display='none';btn.disabled=true;
    btn.textContent=S.loginTab==='login'?'Signing in…':'Creating…';
    const fd=new FormData(e.target);
    const body={email:fd.get('email'),password:fd.get('password')};
    if(S.loginTab==='register')body.name=fd.get('name');
    try{
      const r=await api(`/auth/${S.loginTab==='login'?'login':'register'}`,{method:'POST',body:JSON.stringify(body)});
      if(r.success){
        if(S.loginTab==='register'){toast('Account created! Sign in now.','success');S.loginTab='login';render();return;}
        S.token=r.data.token;
        S.user={...r.data.user,av:(r.data.user.name||'U')[0].toUpperCase()};
        localStorage.setItem('am_tk',S.token);
        localStorage.setItem('am_u',JSON.stringify(S.user));
        S.view='dashboard';render();S.loadAll();
      }else{
        const msg=r.errors?r.errors.map(x=>x.msg).join(', '):r.message||'Failed';
        err.textContent=msg;err.style.display='block';
        btn.disabled=false;btn.textContent=S.loginTab==='login'?'Sign In':'Create Account';
      }
    }catch{
      err.textContent='Cannot connect to server. Make sure the backend is running on port 3001.';
      err.style.display='block';btn.disabled=false;
      btn.textContent=S.loginTab==='login'?'Sign In':'Create Account';
    }
  };
}
// ─── Layout ──────────────────────────────────────
function renderLayout(){
  const views={dashboard:'Dashboard',meetings:'All Meetings',mytasks:'My Tasks',recurring:'Recurring',notifications:'Notifications',team:'Team',settings:'Settings',detail:'Meeting Detail'};
  const notifCount=S.notifs.filter(n=>!n.read).length;
  return`<div class="layout">
  <aside class="sidebar ${S.settings.sidebarCollapsed?'collapsed':''}">
    <div class="brand"><div class="brand-icon"><img src="/assets/logo.png" alt="AM"></div><div><div class="brand-name">ActionMeet</div><div class="brand-tag">v1.0</div></div></div>
    <div class="user-card">
      <div class="avatar">${S.user.av||'U'}</div>
      <div><div class="user-name">${S.user.name||S.user.email}</div>
      <div class="user-role">${S.user.role||'member'}</div></div>
    </div>
    <nav class="nav">
      ${navI('dashboard','fa-home','Dashboard')}
      ${navI('meetings','fa-calendar-alt','All Meetings')}
      ${navI('mytasks','fa-check-square','My Tasks')}
      ${navI('recurring','fa-sync-alt','Recurring')}
      ${navI('notifications','fa-bell','Notifications',notifCount)}
      ${navI('team','fa-users','Team')}
      <div style="border-top:1px solid var(--border);margin:12px 0;padding-top:12px">
        ${navI('settings','fa-cog','Settings')}
      </div>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn btn-ghost btn-sm" id="collapseBtn" style="width:100%;margin-bottom:8px" title="Toggle Sidebar"><i class="fas ${S.settings.sidebarCollapsed?'fa-chevron-right':'fa-chevron-left'}"></i> <span style="${S.settings.sidebarCollapsed?'display:none':''}">${S.settings.sidebarCollapsed?'':'Collapse'}</span></button>
      <button class="btn btn-ghost btn-sm" id="logoutBtn" style="width:100%" title="Logout"><i class="fas fa-sign-out-alt"></i> <span style="${S.settings.sidebarCollapsed?'display:none':''}">Logout</span></button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar"><h1 class="topbar-title">${views[S.view]||'ActionMeet'}</h1></div>
    <div class="content"><div class="content-inner" id="viewContent">${renderView()}</div></div>
  </div>
</div>
${S.view==='dashboard'||S.view==='meetings'||S.view==='team'?'<button class="fab" id="fabBtn"><i class="fas fa-plus"></i></button>':''}`;
}
function navI(v,ic,label,badge=0){
  const b=badge>0?`<span class="nav-badge">${badge}</span>`:'';
  return`<div class="nav-item ${S.view===v?'active':''}" data-view="${v}"><i class="fas ${ic}"></i><span>${label}</span>${b}</div>`;
}
function hookApp(){
  document.querySelectorAll('.nav-item[data-view]').forEach(el=>el.onclick=async()=>{
    S.view=el.dataset.view;render();
    if(S.view==='mytasks'){await S.fetchMyTasks();render();}
    if(S.view==='team'){await S.fetchTeam();render();}
    if(S.view==='dashboard'){await S.fetchMeetings();render();}
  });
  document.getElementById('logoutBtn')?.addEventListener('click',()=>S.logout());
  document.getElementById('collapseBtn')?.addEventListener('click',()=>{
    S.settings.sidebarCollapsed = !S.settings.sidebarCollapsed;
    S.applySettings();
    render();
  });
  document.getElementById('fabBtn')?.addEventListener('click',()=>{
    if(S.view==='team') showCreateTeamModal();
    else showNewMeetingModal();
  });
  document.querySelectorAll('.filter-btn').forEach(b=>b.onclick=()=>{S.filter=b.dataset.f;render();});
}
// ─── Views ───────────────────────────────────────
function renderView(){
  switch(S.view){
    case'dashboard':return renderDashboard();
    case'meetings':return renderMeetingsPage();
    case'mytasks':return renderMyTasks();
    case'recurring':return renderRecurring();
    case'notifications':return renderNotifs();
    case'team':return renderTeam();
    case'settings':return renderSettings();
    case'detail':return renderDetail();
    default:return'';
  }
}
// Dashboard
function renderDashboard(){
  const all=S.meetings;const ap=all.flatMap(m=>m.agendaPoints||[]);
  const open=ap.filter(a=>a.status==='open').length;
  const closed=ap.filter(a=>a.status!=='open').length;
  const upcoming=all.filter(m=>m.status==='upcoming').length;
  const filtered=filterList(all,S.filter);
  
  const firstName=(S.user.name||S.user.email).split(' ')[0];
  const greeting=new Date().getHours()<12?'Good morning':new Date().getHours()<18?'Good afternoon':'Good evening';

  // Group meetings into chains (parent -> children) if they have a parentMeeting
  // 1. Build a map of all meetings
  const mTreeMap = {};
  filtered.forEach(m => mTreeMap[m.id||m._id] = {...m, children: []});
  
  // 2. Assign children
  const roots = [];
  filtered.forEach(m => {
     if(m.parentMeeting && mTreeMap[m.parentMeeting]) {
         mTreeMap[m.parentMeeting].children.push(mTreeMap[m.id||m._id]);
     } else {
         roots.push(mTreeMap[m.id||m._id]);
     }
  });

  // 3. Render function for a deeply nested or flat meeting
  // We highlight the root (current) and collapse children
  const renderMeetingGroup = (node) => {
      let html = renderMCard(node);
      if(node.children && node.children.length > 0) {
          // Sort children descending (newest follow-up first)
          node.children.sort((a,b)=> new Date(b.date||b.createdAt) - new Date(a.date||a.createdAt));
          html += `<details class="followup-details" style="margin-top:-10px;margin-bottom:20px;margin-left:20px;border-left:2px solid var(--border);padding-left:15px">
                      <summary style="cursor:pointer;font-size:12px;color:var(--text3);padding:8px 0;outline:none;user-select:none">
                        <i class="fas fa-history"></i> Show ${node.children.length} Previous Follow-up(s)
                      </summary>
                      <div class="grid2" style="margin-top:10px;grid-template-columns:1fr">
                        ${node.children.map(renderMeetingGroup).join('')}
                      </div>
                   </details>`;
      }
      return html;
  };

  return`
  <div style="margin-bottom:32px">
    <h1 style="font-size:28px;font-weight:800;color:var(--text);margin-bottom:8px">${greeting}, ${firstName}! 👋</h1>
    <p style="color:var(--text3);font-size:14px">Here is what's happening with your meetings and tasks today.</p>
  </div>
  
  <div class="stats-grid">
    ${stat('purple','fa-calendar-alt',all.length,'Total Meetings')}
    ${stat('orange','fa-clock',upcoming,'Upcoming')}
    ${stat('red','fa-tasks',open,'Open Tasks')}
    ${stat('green','fa-check-circle',closed,'Closed Tasks')}
  </div>
  
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;margin-top:40px">
    <h2 style="font-size:18px;font-weight:700">Recent Meetings</h2>
    <div class="filter-row" style="margin-bottom:0">
      ${['all','upcoming','past','recurring'].map(f=>`<button class="filter-btn ${S.filter===f?'active':''}" data-f="${f}">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
    </div>
  </div>
  <div class="grid2" style="align-items:start">
    ${roots.length?roots.map(renderMeetingGroup).join(''):empty('fa-calendar-plus','No meetings yet','Click the + button to create your first meeting')}
  </div>`;
}
function stat(col,ic,val,label){
  return`<div class="stat-card"><div class="stat-icon ${col}"><i class="fas ${ic}"></i></div><div><div class="stat-val">${val}</div><div class="stat-label">${label}</div></div></div>`;
}
function filterList(list,f){
  if(f==='all')return list;
  if(f==='recurring')return list.filter(m=>m.type==='recurring');
  if(f==='upcoming')return list.filter(m=>m.status==='upcoming');
  if(f==='past')return list.filter(m=>m.status==='past');
  return list;
}
function renderMCard(m){
  const ap=m.agendaPoints||[];
  const open=ap.filter(a=>a.status==='open').length;
  const closed=ap.filter(a=>a.status!=='open').length;
  const pct=ap.length?Math.round(closed/ap.length*100):0;
  const parts=m.participants||[];
  const isHost=m.role==='host';
  const menuId='menu_'+m.id;
  const safeTitle=m.title.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  // Participant avatar stack (max 4 shown)
  const avHtml=parts.slice(0,4).map(p=>{
    const u=p.user||p;
    const n=(u.name||u.email||'?')[0].toUpperCase();
    return `<div class="card-mini-av" title="${u.name||u.email||''}">${n}</div>`;
  }).join('')+(parts.length>4?`<div class="card-mini-av" style="background:var(--bg3);color:var(--text3);font-size:9px">+${parts.length-4}</div>`:'');
  const statusLabel={upcoming:'Upcoming',past:'Past',recurring:'Recurring',cancelled:'Cancelled'};
  return`<div class="meeting-card" onclick="openDetail('${m.id}')" style="padding:20px 20px 18px 22px">
  <!-- Left color stripe based on status -->
  <div class="card-type-stripe ${m.type==='recurring'?'recurring':m.status}"></div>
  <!-- Header row: title + 3-dot menu -->
  <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px">
    <div style="flex:1;min-width:0">
      <div class="meeting-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px">${m.title}</div>
      <div class="meeting-meta">
        <span><i class="fas fa-calendar-day"></i> ${m.date}</span>
        ${m.location?`<span><i class="fas fa-map-marker-alt"></i> ${m.location}</span>`:''}
      </div>
    </div>
    <!-- ⋯ Three-dot menu -->
    <div class="card-menu-wrap" onclick="event.stopPropagation()">
      <button class="card-menu-btn" onclick="toggleMenu('${menuId}')" title="Options">&#8942;</button>
      <div class="card-dropdown" id="${menuId}">
        <button class="card-dropdown-item" onclick="closeMenus();openDetail('${m.id}')">
          <i class="fas fa-eye"></i> View Details
        </button>
        ${isHost?`
        <button class="card-dropdown-item" onclick="closeMenus();showEditMeetingModal('${m.id}')">
          <i class="fas fa-pen"></i> Edit Meeting
        </button>
        <button class="card-dropdown-item" onclick="closeMenus();showAddAgendaModal('${m.id}')">
          <i class="fas fa-plus-circle"></i> Add Agenda Point
        </button>
        <button class="card-dropdown-item" onclick="closeMenus();showAddParticipantModal('${m.id}')">
          <i class="fas fa-user-plus"></i> Invite Participant
        </button>
        <button class="card-dropdown-item" onclick="closeMenus();showFollowUpModal('${m.id}')">
          <i class="fas fa-calendar-plus"></i> Create Follow-Up
        </button>
        <div class="card-dropdown-sep"></div>
        <button class="card-dropdown-item danger" onclick="closeMenus();deleteMeeting('${m.id}','${safeTitle}')">
          <i class="fas fa-trash-alt"></i> Delete Meeting
        </button>`:''}
      </div>
    </div>
  </div>
  <!-- Badges row -->
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px">
    ${isHost?'<span class="badge host"><i class="fas fa-crown" style="font-size:9px"></i> Host</span>':'<span class="badge participant">Participant</span>'}
    <span class="badge ${m.status}">${statusLabel[m.status]||m.status}</span>
    ${m.type==='recurring'?'<span class="badge recurring"><i class="fas fa-sync-alt" style="font-size:9px"></i> Recurring</span>':''}
  </div>
  <!-- Progress bar (only if agenda points exist) -->
  ${ap.length?`<div style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px">
      <span>Task Completion</span>
      <span style="font-weight:700;color:${pct===100?'var(--success)':'var(--text2)'}">${pct}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`:''}
  <!-- Participants row -->
  <div style="display:flex;align-items:center;justify-content:space-between">

function toggleMenu(id){

  if(!el)return;
  const isOpen=el.classList.contains('open');
  closeMenus();
  if(!isOpen)el.classList.add('open');
}
function closeMenus(){
  document.querySelectorAll('.card-dropdown.open').forEach(d=>d.classList.remove('open'));

async function doEditMemberRole(teamId, userId, newRole) {
  try {
    const r = await api(`/team/${teamId}/members/${userId}`, {method: 'PUT', body: JSON.stringify({role: newRole})});
    if(r.success) {
      toast('Member role updated!', 'success');
      await S.fetchTeam(); render();
    } else {
      toast(r.message || 'Failed to update role', 'error');
      // Revert select dropdown implicitly by re-rendering original state
      render();
    }
  } catch(e) {
    toast('Network error saving role', 'error');
    render();
  }
}
async function doRemoveMember(teamId, userId, userName) {
  if(!confirm(`Are you sure you want to remove ${userName} from this workspace?\n\nThey will instantly lose access to all tasks and meeting notes.`)) return;
  try {
    const r = await api(`/team/${teamId}/members/${userId}`, {method: 'DELETE'});
    if(r.success) {
      toast('Member successfully removed', 'success');
      await S.fetchTeam(); render();
    } else {
      toast(r.message || 'Failed to remove member', 'error');
    }
  } catch(e) {
    toast('Network error removing member', 'error');
  }
}

// ─── Settings Action Helpers ──────────────────────
function setSettTab(t){S.settings._tab=t;S.applySettings();render();}
function setTheme(t){S.settings.theme=t;S.applySettings();render();}
function toggleCompact(b){S.settings.compactMode=b;S.applySettings();render();}
function saveSetting(key,val){S.settings[key]=val;S.applySettings();}
function setAccentColor(c){
  S.settings.accentColor=c;
  document.documentElement.style.setProperty('--primary',c);
  document.documentElement.style.setProperty('--primary-dark',c);
  S.applySettings();render();
}
async function saveProfile(){
  const name=(document.getElementById('sp_name')?.value||'').trim();
  const bio=(document.getElementById('sp_bio')?.value||'').trim();
  const email=(document.getElementById('sp_email')?.value||'').trim();
  if(!name){toast('Name cannot be empty','warning');return;}
  S.settings.bio=bio;
  if(S.user){S.user.name=name;S.user.av=name[0].toUpperCase();}
  localStorage.setItem('am_u',JSON.stringify(S.user));
  try{
    await api('/auth/profile',{method:'PUT',body:JSON.stringify({name,bio,email})});
    toast('Profile updated!','success');render();
  }catch{toast('Profile saved locally','info');render();}
}
async function uploadAvatar(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result;
    
    // Optimistic UI update
    const previousAv = S.user.av;
    S.user.av = base64;
    localStorage.setItem('am_u',JSON.stringify(S.user));
    render();
    
    try {
      const r = await api('/auth/profile', {method: 'PUT', body: JSON.stringify({avatar: base64})});
      if(r.success) {
        toast('Profile picture updated!', 'success');
      } else {
        S.user.av = previousAv;
        localStorage.setItem('am_u',JSON.stringify(S.user));
        toast('Failed to upload picture', 'error');
        render();
      }
    } catch(err) {
      S.user.av = previousAv;
      localStorage.setItem('am_u',JSON.stringify(S.user));
      toast('Network error during upload', 'error');
      render();
    }
  };
  reader.readAsDataURL(file);
}
async function changePassword(){
  const op=document.getElementById('sp_oldpw')?.value||'';
  const np=document.getElementById('sp_newpw')?.value||'';
  const cp=document.getElementById('sp_cfpw')?.value||'';
  if(!op||!np){toast('Fill in all password fields','warning');return;}
  if(np!==cp){toast('New passwords do not match','error');return;}
  if(np.length<6){toast('Password must be at least 6 characters','warning');return;}
  try{
    const r=await api('/auth/password',{method:'PUT',body:JSON.stringify({currentPassword:op,newPassword:np})});
    if(r.success){toast('Password changed successfully!','success');}
    else toast(r.message||'Failed to change password','error');
  }catch{toast('Network error','error');}
}
function saveWorkspaceSettings(){
  S.settings.workspaceName=(document.getElementById('ws_name')?.value||'').trim();
  S.settings.workspaceDesc=(document.getElementById('ws_desc')?.value||'').trim();
  S.applySettings();toast('Workspace settings saved','success');
}
function exportData(type){
  const data=type==='meetings'?S.meetings:type==='tasks'?S.myTasks:S.team;
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`actionmeet_${type}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast(`${type.charAt(0).toUpperCase()+type.slice(1)} data exported!`,'success');
}
function confirmDeleteAccount(){
  if(!confirm('⚠️ This will permanently delete your account and ALL your data.\n\nThis action CANNOT be undone. Continue?'))return;
  toast('Account deletion would be processed here (backend hook needed)','info');
}


// Meeting Detail
async function openDetail(id){
  S.sel=id;S.view='detail';render();
  try{
    const r=await api(`/agenda/meeting/${id}`);
    if(r.success){
      const m=S.getMeeting(id);

// ─── Actions ─────────────────────────────────────
async function toggleAgenda(mid,aid){
  const m=S.getMeeting(mid);let ap=null;
  let oldStatus = null;
  if(m){
    ap=(m.agendaPoints||[]).find(a=>(a.id||a._id)==aid);
    if(ap){
      oldStatus = ap.status;
      ap.status=ap.status==='open'?'closed':'open';
      render();
    }
  }
  try {
    const targetStatus = ap?.status==='closed'?'completed':'open';
    const r = await api(`/agenda/${aid}`, {method:'PUT',body:JSON.stringify({status:targetStatus})});
    if(r.success) {
      toast(`Task marked ${ap?.status||'updated'}!`, 'success');
      // Sync MyTasks and re-render so dashboard updates too
      await S.fetchMyTasks();
      render();
    } else {
      if(ap) { ap.status = oldStatus; render(); }
      toast(r.message || 'Failed to update task', 'error');
    }
  } catch(e) {
    if(ap) { ap.status = oldStatus; render(); }
    toast('Network error', 'error');
  }
}
async function toggleTask(mid,aid){
  if(mid) {
      await toggleAgenda(mid,aid);
  } else {
      const t=S.myTasks.find(x=>(x.id||x._id)==aid);
      let oldStatus = null;
      if(t){
          oldStatus = t.status;
          t.status=t.status==='open'?'closed':'open';
          render();
      }
      try {
          const targetStatus = t?.status==='closed'?'completed':'open';
          const r = await api(`/agenda/${aid}`, {method:'PUT',body:JSON.stringify({status:targetStatus})});
          if(r.success) {
              toast(`Task marked ${t?.status||'updated'}!`, 'success');
              await S.fetchMeetings();
              render();
          } else {
              if(t) { t.status = oldStatus; render(); }
              toast(r.message || 'Failed to update task', 'error');
          }
      } catch(e) {
          if(t) { t.status = oldStatus; render(); }
          toast('Network error', 'error');
      }
  }
}
async function deleteAgenda(mid,aid){
  if(!confirm('Are you sure you want to delete this agenda point?')) return;
  try {
    const r = await api(`/agenda/${aid}`, { method: 'DELETE' });
    if(r.success) {
      const m = S.getMeeting(mid);
      if(m && m.agendaPoints) {
        m.agendaPoints = m.agendaPoints.filter(a => (a.id||a._id) !== aid);
        await S.fetchMyTasks(); // sync tasks
        render();
      }
      toast('Agenda point deleted', 'success');
    } else {
      toast(r.message || 'Failed to delete agenda point', 'error');
    }
  } catch {
    toast('Network error', 'error');
  }
}
async function deleteMeeting(id,title){
  if(!confirm(`Delete "${title}"?`))return;
  S.meetings=S.meetings.filter(m=>m.id!==id);render();
  try{await api(`/meetings/${id}`,{method:'DELETE'});toast('Meeting deleted','success');}catch{toast('Deleted locally','info');}
}

  clearTimeout(searchTimer);

async function doCreateMeeting(){
  const title=(document.getElementById('mtgTitle')?.value||'').trim();
  const date=document.getElementById('mtgDate')?.value;
  const desc=(document.getElementById('mtgDesc')?.value||'').trim();
  const rec=(document.getElementById('mtgRecurrence')?.value||'none');
  if(!title||title.length<2){toast('Title must be at least 2 characters','warning');return;}
  if(!date){toast('Please select a date and time','warning');return;}
  const btn=document.getElementById('saveMtgBtn');
  btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Creating…';
  try{
    const body={title,scheduledFor:new Date(date).toISOString()};
    if(desc)body.description=desc;
    if(S.selectedParticipants.length)body.participants=S.selectedParticipants.map(p=>p.id);
    
    let path = '/meetings';
    if(rec!=='none'){
      path='/recurring';
      body.recurrence={type:rec,interval:1};
    }
    
    const r=await api(path,{method:'POST',body:JSON.stringify(body)});
    if(r.success){
      S.notifs.unshift({text:`Meeting created: ${title}`,type:'success',time:'Just now',read:false});
      closeModal();await S.fetchMeetings();render();toast('Meeting created successfully!','success');
    }else{
      const msg=r.errors?r.errors.map(e=>e.msg).join(', '):r.message||'Failed';
      toast(msg,'error');btn.disabled=false;btn.innerHTML='<i class="fas fa-plus"></i> Create Meeting';
    }
  }catch(e){toast('Network error — is the backend running?','error');btn.disabled=false;btn.innerHTML='<i class="fas fa-plus"></i> Create Meeting';}
}

    else toast(r.message||'Failed','error');
  }catch{toast('Network error','error');}
}

// ─── Add Agenda Modal ────────────────────────────
function showAddAgendaModal(mid){
  const m = S.getMeeting(mid);
  if (!m) return;
  const parts = m.participants || [];
  const assigneeOptions = parts.map(p => {
      const u = p.user || p;
      const uId = u._id || u.id;
      const uName = u.name || u.email || 'Unknown';
      return `<option value="${uId}">${uName}</option>`;
  }).join('');

  const o=document.createElement('div');o.className='modal-overlay';
  o.innerHTML=`<div class="modal">
  <div class="modal-header"><h2 class="modal-title">Add Agenda Point</h2><button class="modal-close" onclick="closeModal()">×</button></div>
  <div class="modal-body">
    <div class="form-group"><label class="form-label">Description *</label>
      <textarea class="form-input" id="apText" rows="3" placeholder="What needs to be discussed?" required></textarea></div>
    <div class="form-group"><label class="form-label">Assign To (Optional)</label>
      <select class="form-input" id="apAssignee">
        <option value="">-- Unassigned --</option>
        ${assigneeOptions}
      </select>
    </div>
    <div class="form-group"><label class="form-label">Notes (optional)</label>
      <textarea class="form-input" id="apNote" rows="2" placeholder="Additional context…"></textarea></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" id="saveApBtn" onclick="doAddAgenda('${mid}')"><i class="fas fa-plus"></i> Add Point</button>
  </div></div>`;
  document.body.appendChild(o);
}
async function doAddAgenda(mid){
  const text=(document.getElementById('apText')?.value||'').trim();
  const note=(document.getElementById('apNote')?.value||'').trim();
  const assignee=(document.getElementById('apAssignee')?.value||undefined);
  
  if(!text){toast('Please enter a description','warning');return;}
  const btn=document.getElementById('saveApBtn');
  btn.disabled=true;btn.textContent='Adding…';
  try{
    const reqBody = {title:text, description:note||undefined, meeting:mid};
    if (assignee) reqBody.responsiblePerson = assignee;
    
    const r=await api('/agenda',{method:'POST',body:JSON.stringify(reqBody)});
    if(r.success){
      const m=S.getMeeting(mid);
      if(m){
        if(!m.agendaPoints)m.agendaPoints=[];
        let assignedUserDetails = null;
        if(assignee) {
           const p = m.participants.find(pt=>(pt.user?._id||pt.user)===assignee);
           if(p) assignedUserDetails = p.user;
        }
        m.agendaPoints.push({id:r.data.agenda._id,_id:r.data.agenda._id,text,note,status:'open',assignedTo:assignedUserDetails});
      }
      closeModal();
      await S.fetchMyTasks(); // Sync backend state
      render();
      toast('Agenda point added!','success');
    }else{toast(r.message||'Failed to add','error');btn.disabled=false;btn.textContent='Add Point';}
  }catch{
    toast('Network error — is the backend running?','error');
    btn.disabled=false;btn.textContent='Add Point';
  }
}

async function deleteAgenda(mid, aid) {
  if(!confirm('Are you sure you want to delete this agenda point?')) return;
  try {
    const r = await api(`/agenda/${aid}`, { method: 'DELETE' });
    if(r.success) {
      const m = S.getMeeting(mid);
      if(m && m.agendaPoints) {
        m.agendaPoints = m.agendaPoints.filter(a => (a.id||a._id) !== aid);
        render();
      }
      toast('Agenda point deleted', 'success');
    } else {
      toast(r.message || 'Failed to delete agenda point', 'error');
    }
  } catch {
    toast('Network error', 'error');
  }
}

// ─── Edit Agenda Modal ───────────────────────────
function showEditAgendaModal(mid, aid) {
  const m = S.getMeeting(mid);
  if (!m) return;
  const ap = (m.agendaPoints || []).find(a => (a.id||a._id) === aid);
  if (!ap) return;

  const parts = m.participants || [];
  const assigneeOptions = parts.map(p => {
      const u = p.user || p;
      const uId = u._id || u.id;
      const uName = u.name || u.email || 'Unknown';
      const isSel = ap.assignedTo && ap.assignedTo._id === uId ? 'selected' : '';
      return `<option value="${uId}" ${isSel}>${uName}</option>`;
  }).join('');

  const o=document.createElement('div');o.className='modal-overlay';
  o.innerHTML=`<div class="modal">
  <div class="modal-header"><h2 class="modal-title">Edit Agenda Point</h2><button class="modal-close" onclick="closeModal()">×</button></div>
  <div class="modal-body">
    <div class="form-group"><label class="form-label">Description *</label>
      <textarea class="form-input" id="eApText" rows="3" required>${(ap.text||'').replace(/</g,'&lt;')}</textarea></div>
    <div class="form-group"><label class="form-label">Assign To (Optional)</label>
      <select class="form-input" id="eApAssignee">
        <option value="">-- Unassigned --</option>
        ${assigneeOptions}
      </select>
    </div>
    <div class="form-group"><label class="form-label">Notes (optional)</label>
      <textarea class="form-input" id="eApNote" rows="2">${(ap.note||'').replace(/</g,'&lt;')}</textarea></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" id="saveeApBtn" onclick="doEditAgenda('${mid}','${aid}')"><i class="fas fa-save"></i> Save Changes</button>
  </div></div>`;
  document.body.appendChild(o);
}

async function doEditAgenda(mid, aid) {
  const text=(document.getElementById('eApText')?.value||'').trim();
  const note=(document.getElementById('eApNote')?.value||'').trim();
  const assignee=(document.getElementById('eApAssignee')?.value||undefined);
  
  if(!text){toast('Please enter a description','warning');return;}
  const btn=document.getElementById('saveeApBtn');
  btn.disabled=true;btn.textContent='Saving…';
  
  try {
    const reqBody = {title:text, description:note||undefined};
    // Send responsiblePerson or null if cleared
    reqBody.responsiblePerson = assignee ? assignee : null;
    
    const r=await api(`/agenda/${aid}`, {method:'PUT', body:JSON.stringify(reqBody)});
    if(r.success) {
      const m=S.getMeeting(mid);
      if(m && m.agendaPoints) {
        const ap = m.agendaPoints.find(a => (a.id||a._id) === aid);
        if(ap) {
          ap.text = text;
          ap.note = note;
          let assignedUserDetails = null;
          if(assignee) {
             const p = m.participants.find(pt=>(pt.user?._id||pt.user)===assignee);
             if(p) assignedUserDetails = p.user;
          }
          ap.assignedTo = assignedUserDetails;
        }
      }
      closeModal();
      await S.fetchMyTasks();
      render();
      toast('Agenda point updated!','success');
    } else {
      toast(r.message||'Failed to update', 'error');
      btn.disabled=false;btn.textContent='Save Changes';
    }
  } catch {
    toast('Network error — is the backend running?', 'error');
    btn.disabled=false;btn.textContent='Save Changes';
  }
}

// ─── Follow-up Meeting Modal ─────────────────────
function showFollowUpModal(mid) {
  const m = S.getMeeting(mid);
  if(!m) return;
  const o = document.createElement('div');
  o.className = 'modal-overlay';
  const defaultDate = new Date();
  defaultDate.setDate(defaultDate.getDate() + 7); // Default to 1 week from now
  const dtVal = defaultDate.toISOString().slice(0, 16);
  
  o.innerHTML=`<div class="modal">
  <div class="modal-header"><h2 class="modal-title">Create Follow-Up</h2><button class="modal-close" onclick="closeModal()">×</button></div>
  <div class="modal-body">
    <p style="font-size:13px;color:var(--text3);margin-bottom:14px">This will create a new meeting with the same participants. All <b>open</b> agenda points will automatically be copied over.</p>
    <div class="form-group"><label class="form-label">Title *</label>
      <input class="form-input" id="fuTitle" type="text" value="Follow-up: ${(m.title||'').replace(/"/g,'&quot;')}" required></div>
    <div class="form-group"><label class="form-label">Next Date & Time *</label>
      <input class="form-input" id="fuDate" type="datetime-local" value="${dtVal}" required></div>
    <div class="form-group"><label class="form-label">Location</label>
      <input class="form-input" id="fuLocation" type="text" value="${(m.location||'').replace(/"/g,'&quot;')}"></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" id="saveFuBtn" onclick="doCreateFollowUp('${mid}')"><i class="fas fa-arrow-right"></i> Create & Carry Forward</button>
  </div></div>`;
  document.body.appendChild(o);
}

async function doCreateFollowUp(mid) {
  const title = (document.getElementById('fuTitle')?.value||'').trim();
  const scheduledFor = document.getElementById('fuDate')?.value;
  const location = (document.getElementById('fuLocation')?.value||'').trim();
  
  if(!title){toast('Title is required','warning');return;}
  if(!scheduledFor){toast('Date is required','warning');return;}
  
  const btn = document.getElementById('saveFuBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating…';
  
  try {
    const r = await api(`/meetings/${mid}/follow-up`, {
      method: 'POST',
      body: JSON.stringify({title, scheduledFor: new Date(scheduledFor).toISOString(), location: location || undefined})
    });
    if(r.success) {
      toast('Follow-up created! Open tasks carried forward.', 'success');
      closeModal();
      await S.fetchMeetings();
      await S.fetchMyTasks();
      render();
    } else {
      toast(r.message || 'Failed to create follow-up', 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-arrow-right"></i> Create & Carry Forward';
    }
  } catch(e) {
    toast('Network error — is the backend running?', 'error');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-arrow-right"></i> Create & Carry Forward';
  }
}

// ─── Boot ────────────────────────────────────────
S.init();
</script>
